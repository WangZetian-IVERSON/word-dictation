<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 单词听写系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #4361ee;
      --bg: #f0f2f8;
      --card: #ffffff;
      --text: #1e2235;
    }
    body {
      background: linear-gradient(135deg, #4361ee 0%, #7b2ff7 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      text-align: center;
    }
    .login-logo { font-size: 3rem; margin-bottom: 8px; }
    .login-title { font-size: 1.4rem; font-weight: 700; color: #1e2235; margin-bottom: 4px; }
    .login-sub { color: #888; font-size: .9rem; margin-bottom: 32px; }
    .pw-wrap {
      position: relative; margin-bottom: 16px;
    }
    .pw-wrap input {
      width: 100%; padding: 14px 46px 14px 18px;
      border: 2px solid #e4e8f5; border-radius: 12px;
      font-size: 1.1rem; letter-spacing: 4px;
      color: #1e2235; transition: border-color .2s;
    }
    .pw-wrap input:focus { outline: none; border-color: #4361ee; }
    .pw-eye {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: #aaa; font-size: 1.1rem; background: none; border: none;
    }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4361ee, #7b2ff7);
      border: none; border-radius: 12px;
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; }
    .err-msg {
      background: #fff0f3; color: #ef476f;
      border: 1px solid rgba(239,71,111,.3);
      border-radius: 8px; padding: 10px; margin-bottom: 16px;
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📖</div>
    <div class="login-title">单词听写系统</div>
    <div class="login-sub">请输入访问密码</div>

    {% if error %}
    <div class="err-msg"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="pw-wrap">
        <input type="password" id="pwInput" name="password" placeholder="输入密码"
               autofocus autocomplete="current-password" />
        <button type="button" class="pw-eye" id="eyeBtn">
          <i class="bi bi-eye-slash" id="eyeIcon"></i>
        </button>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-unlock-fill"></i> 进入系统
      </button>
    </form>
  </div>

  <script>
    document.getElementById('eyeBtn').addEventListener('click', () => {
      const inp = document.getElementById('pwInput');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye-slash';
      }
    });
  </script>
</body>
</html>
